[package]
name = "atlas-mcp"
version = "1.0.0"
edition = "2024"
description = "MCP server exposing Atlas graph, impact, and review tools over stdio"

[dependencies]
atlas-core.workspace = true
atlas-adapters = { path = "../atlas-adapters" , version = "1.0.0"}
atlas-contentstore = { path = "../atlas-contentstore" , version = "1.0.0"}
atlas-engine.workspace = true
atlas-impact = { path = "../atlas-impact" , version = "1.0.0"}
atlas-parser = { path = "../atlas-parser" , version = "1.0.0"}
atlas-repo = { path = "../atlas-repo" , version = "1.0.0"}
atlas-reasoning = { path = "../atlas-reasoning" , version = "1.0.0"}
atlas-review = { path = "../atlas-review" , version = "1.0.0"}
atlas-search = { path = "../atlas-search" , version = "1.0.0"}
atlas-session = { path = "../atlas-session" , version = "1.0.0"}
atlas-store-sqlite = { path = "../atlas-store-sqlite" , version = "1.0.0"}
anyhow.workspace = true
camino.workspace = true
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
toon-format = { version = "0.4.5", default-features = false }
tracing.workspace = true
libc = "0.2"
signal-hook = "0.3"
ignore = "0.4.25"
globset = "0.4.18"
grep-searcher = "0.1.16"
grep-regex = "0.1.14"

[dev-dependencies]
rusqlite.workspace = true
tempfile = "3"
tiktoken-rs = "0.6"
