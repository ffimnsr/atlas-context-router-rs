[package]
name = "atlas-mcp"
version = "0.3.1"
edition = "2024"
description = "MCP server exposing Atlas graph, impact, and review tools over stdio"

[dependencies]
atlas-core.workspace = true
atlas-adapters = { path = "../atlas-adapters" , version = "0.3.1"}
atlas-contentstore = { path = "../atlas-contentstore" , version = "0.3.1"}
atlas-engine.workspace = true
atlas-impact = { path = "../atlas-impact" , version = "0.3.1"}
atlas-parser = { path = "../atlas-parser" , version = "0.3.1"}
atlas-repo = { path = "../atlas-repo" , version = "0.3.1"}
atlas-review = { path = "../atlas-review" , version = "0.3.1"}
atlas-search = { path = "../atlas-search" , version = "0.3.1"}
atlas-session = { path = "../atlas-session" , version = "0.3.1"}
atlas-store-sqlite = { path = "../atlas-store-sqlite" , version = "0.3.1"}
anyhow.workspace = true
camino.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
toon-format = { version = "0.4.5", default-features = false }
tracing.workspace = true

[dev-dependencies]
tempfile = "3"
tiktoken-rs = "0.6"
