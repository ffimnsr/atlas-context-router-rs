[package]
name = "atlas-cli"
version = "0.1.0"
edition = "2024"
description = "Command-line interface for building, updating, and querying Atlas code graphs"

[[bin]]
name = "atlas"
path = "src/main.rs"

[dependencies]
atlas-core.workspace = true
atlas-adapters = { path = "../atlas-adapters" }
atlas-engine.workspace = true
atlas-impact = { path = "../atlas-impact" }
atlas-mcp.workspace = true
atlas-parser = { path = "../atlas-parser" }
atlas-reasoning = { path = "../atlas-reasoning" }
atlas-refactor = { path = "../atlas-refactor" }
atlas-repo = { path = "../atlas-repo" }
atlas-search = { path = "../atlas-search" }
atlas-review = { path = "../atlas-review" }
atlas-store-sqlite = { path = "../atlas-store-sqlite" }
anyhow.workspace = true
camino.workspace = true
clap.workspace = true
clap_complete.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
tempfile = "3"
