[package]
name = "atlas-cli"
version = "0.3.1"
edition = "2024"
description = "Command-line interface for building, updating, and querying Atlas code graphs"

[[bin]]
name = "atlas"
path = "src/main.rs"

[dependencies]
atlas-core.workspace = true
atlas-adapters = { path = "../atlas-adapters" , version = "0.3.1"}
atlas-contentstore = { path = "../atlas-contentstore" , version = "0.3.1"}
atlas-engine.workspace = true
atlas-impact = { path = "../atlas-impact" , version = "0.3.1"}
atlas-mcp.workspace = true
atlas-parser = { path = "../atlas-parser" , version = "0.3.1"}
atlas-reasoning = { path = "../atlas-reasoning" , version = "0.3.1"}
atlas-refactor = { path = "../atlas-refactor" , version = "0.3.1"}
atlas-repo = { path = "../atlas-repo" , version = "0.3.1"}
atlas-search = { path = "../atlas-search" , version = "0.3.1"}
atlas-review = { path = "../atlas-review" , version = "0.3.1"}
atlas-session = { path = "../atlas-session" , version = "0.3.1"}
atlas-store-sqlite = { path = "../atlas-store-sqlite" , version = "0.3.1"}
anyhow.workspace = true
camino.workspace = true
clap.workspace = true
clap_complete.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
tempfile = "3"
