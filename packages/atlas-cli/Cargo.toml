[package]
name = "atlas-cli"
version = "1.0.1"
edition = "2024"
description = "Command-line interface for building, updating, and querying Atlas code graphs"

[features]
default = []
http-transport = ["atlas-mcp/http-transport"]

[[bin]]
name = "atlas"
path = "src/main.rs"

[dependencies]
atlas-core.workspace = true
atlas-adapters = { path = "../atlas-adapters" , version = "1.0.1"}
atlas-contentstore = { path = "../atlas-contentstore" , version = "1.0.1"}
atlas-engine.workspace = true
atlas-history = { path = "../atlas-history", version = "1.0.1" }
atlas-impact = { path = "../atlas-impact" , version = "1.0.1"}
atlas-mcp.workspace = true
atlas-parser = { path = "../atlas-parser" , version = "1.0.1"}
atlas-reasoning = { path = "../atlas-reasoning" , version = "1.0.1"}
atlas-refactor = { path = "../atlas-refactor" , version = "1.0.1"}
atlas-repo = { path = "../atlas-repo" , version = "1.0.1"}
atlas-search = { path = "../atlas-search" , version = "1.0.1"}
atlas-review = { path = "../atlas-review" , version = "1.0.1"}
atlas-session = { path = "../atlas-session" , version = "1.0.1"}
atlas-store-sqlite = { path = "../atlas-store-sqlite" , version = "1.0.1"}
anyhow.workspace = true
camino.workspace = true
clap.workspace = true
clap_complete.workspace = true
console = "0.15"
dialoguer = "0.11"
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
fs2 = "0.4"
indicatif = "0.17"
libc = "0.2"
signal-hook = "0.3"
sha2.workspace = true

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_Foundation"] }

[dev-dependencies]
jsonschema = "0.18"
rusqlite.workspace = true
tempfile = "3"

[build-dependencies]
time = { workspace = true, features = ["formatting"] }

[lints]
workspace = true
