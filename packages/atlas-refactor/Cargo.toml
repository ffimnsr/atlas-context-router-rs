[package]
name = "atlas-refactor"
version = "0.4.0"
edition = "2024"
description = "Smart refactoring core for Atlas — deterministic rename, dead-code removal, import cleanup, and extract-function detection"

[dependencies]
atlas-core.workspace = true
atlas-parser = { path = "../atlas-parser" , version = "0.4.0"}
atlas-store-sqlite = { path = "../atlas-store-sqlite" , version = "0.4.0"}
sha2.workspace = true
tree-sitter.workspace = true
tracing.workspace = true
serde_json.workspace = true

[dev-dependencies]
atlas-core.workspace = true
criterion.workspace = true
serde_json.workspace = true
tempfile = "3"

[[bench]]
name = "refactor_bench"
harness = false
