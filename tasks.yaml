# yaml-language-server: $schema=https://raw.githubusercontent.com/ffimnsr/mk-rs/main/docs/schema.json

gpg_key_id: 105AF578CF730F08
use_cargo: true

tasks:
  format:
    commands:
      - cargo fmt --all
    description: Format the code using rustfmt.
  format-check:
    commands:
      - cargo fmt --all --check
    description: Verify formatting matches rustfmt output.
  lint:
    commands:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings
    description: Lint the code using clippy and treat warnings as errors.
  lint-stable:
    commands:
      - cargo +stable clippy --workspace --all-targets --all-features -- -D warnings
    description: Lint the code using clippy on stable Rust and treat warnings as errors.
  test:
    commands:
      - cargo test --workspace
    description: Run workspace tests.
  test-summary:
    commands:
      - bash scripts/test-workspace-summary.sh
    description: Run workspace tests and print merged test summary.
  test-summary-check:
    commands:
      - bash scripts/tests/test-workspace-summary-test.sh
    description: Verify merged test summary parser fixtures.
  doc-check:
    commands:
      - cargo doc --workspace --no-deps --document-private-items
    description: Run documentation tests.
    environment:
      RUSTDOCFLAGS: "-D warnings"
  audit:
    commands:
      - cargo audit --workspace
    description: Run cargo-audit to check for vulnerable dependencies.
  deny:
    commands:
      - cargo deny check --workspace
    description: Run cargo-deny to check for license and security issues.
  bench-smoke:
    commands:
      - cargo bench --workspace --no-run
    description: Run benchmarks without executing them to check for compilation issues.
  bench-json-harness:
    commands:
      - bash scripts/bench-json-harness.sh
    description: Run criterion benches with cargo JSON output and capture comparable artifacts.
  coverage:
    commands:
      - cargo llvm-cov --workspace --locked --lcov --output-path target/llvm-cov/lcov.info --html --output-dir target/llvm-cov/html
    description: Generate informational coverage reports using cargo-llvm-cov.
  coverage-llvm-cov:
    commands:
      - cargo llvm-cov --workspace --locked --lcov --output-path target/llvm-cov/lcov.info --html --output-dir target/llvm-cov/html
    description: Generate informational coverage reports using cargo-llvm-cov.
  coverage-tarpaulin:
    commands:
      - cargo tarpaulin --workspace --out Html
    description: Run legacy cargo-tarpaulin coverage analysis and output HTML report.
  install:
    commands:
      - cargo install --path packages/atlas-cli
    description: Install the atlas-cli binary from the local package.
  install-githooks:
    commands:
      - bash -lc 'mkdir -p .githooks && rm -rf .git/hooks && ln -s ../.githooks .git/hooks'
    description: Replace `.git/hooks` with symlink to repo `.githooks`.
  uninstall-githooks:
    commands:
      - bash -lc 'if [ -L .git/hooks ]; then rm .git/hooks; fi && mkdir -p .git/hooks'
    description: Remove `.git/hooks` symlink and recreate local hooks directory.
  lf:
    commands:
      - |
        git ls-files -z --cached --others --exclude-standard \
        | grep -zv 'Cargo.lock$' \
        | xargs -0 -I{} sh -c '[ -f "{}" ] && wc -l "{}"' \
        | awk '$1 > 1000' \
        | sort -nr
    description: Check for files with more than 1000 LOC.
